<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neuroity Research Labs</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap');

  :root {
    --black: #000000;
    --white: #ffffff;
    --off-white: #e8e8e8;
    --dim: #888888;
    --dimmer: #444444;
    --border: rgba(255,255,255,0.08);
    --glass: rgba(255,255,255,0.03);
    --glass-hover: rgba(255,255,255,0.06);
    --glow-blue: rgba(100, 160, 255, 0.15);
    --glow-purple: rgba(150, 100, 255, 0.12);
    --accent: #6fa3ff;
    --accent2: #a87eff;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #000; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    padding: 20px 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    transition: padding 0.3s ease;
  }

  nav.scrolled { padding: 14px 60px; }

  .nav-logo {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 18px;
    letter-spacing: -0.3px;
    color: var(--white);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--accent);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
  }

  .nav-links a {
    color: var(--dim);
    text-decoration: none;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.3px;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--white); }

  .nav-cta {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    color: var(--black) !important;
    background: var(--white);
    padding: 8px 20px;
    border-radius: 100px;
    text-decoration: none;
    transition: background 0.2s, transform 0.2s !important;
  }

  .nav-cta:hover { background: var(--off-white) !important; transform: translateY(-1px); }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 5px;
  }

  .hamburger span {
    display: block;
    width: 22px; height: 1.5px;
    background: var(--white);
    transition: all 0.3s;
  }

  .mobile-menu {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.97);
    z-index: 999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
  }

  .mobile-menu.open { display: flex; }

  .mobile-menu a {
    color: var(--white);
    text-decoration: none;
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 300;
    transition: opacity 0.2s;
  }

  .mobile-menu a:hover { opacity: 0.5; }

  .mobile-close {
    position: absolute;
    top: 24px; right: 24px;
    cursor: pointer;
    color: var(--dim);
    font-size: 28px;
    line-height: 1;
  }

  /* HERO */
  #hero {
    position: relative;
    width: 100%;
    height: 100vh;
    min-height: 700px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
  }

  #neural-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  .hero-content {
    position: relative;
    z-index: 2;
    max-width: 900px;
    padding: 0 24px;
  }

  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 28px;
    opacity: 0;
    animation: fade-up 0.8s ease 0.3s forwards;
  }

  .hero-eyebrow::before, .hero-eyebrow::after {
    content: '';
    display: block;
    width: 30px; height: 1px;
    background: var(--accent);
    opacity: 0.5;
  }

  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(42px, 7vw, 88px);
    font-weight: 700;
    letter-spacing: -2px;
    line-height: 1.0;
    color: var(--white);
    margin-bottom: 24px;
    opacity: 0;
    animation: fade-up 0.9s ease 0.5s forwards;
  }

  .hero-title span {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-subtitle {
    font-size: clamp(15px, 2vw, 19px);
    font-weight: 300;
    color: var(--dim);
    max-width: 540px;
    margin: 0 auto 44px;
    line-height: 1.65;
    opacity: 0;
    animation: fade-up 0.9s ease 0.7s forwards;
  }

  .hero-buttons {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    opacity: 0;
    animation: fade-up 0.9s ease 0.9s forwards;
  }

  .btn-primary {
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    color: var(--black);
    background: var(--white);
    padding: 14px 32px;
    border-radius: 100px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
  }

  .btn-primary:hover {
    background: var(--off-white);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(255,255,255,0.15);
  }

  .btn-secondary {
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 400;
    color: var(--white);
    background: transparent;
    padding: 14px 32px;
    border-radius: 100px;
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.2);
    cursor: pointer;
    transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease;
  }

  .btn-secondary:hover {
    border-color: rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.04);
    transform: translateY(-2px);
  }

  .hero-scroll-hint {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0;
    animation: fade-in 1s ease 1.5s forwards;
  }

  .scroll-line {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, transparent, var(--dim));
    animation: scroll-line 2s ease-in-out infinite;
  }

  @keyframes scroll-line {
    0% { transform: scaleY(0); transform-origin: top; }
    50% { transform: scaleY(1); transform-origin: top; }
    51% { transform: scaleY(1); transform-origin: bottom; }
    100% { transform: scaleY(0); transform-origin: bottom; }
  }

  /* ANIMATIONS */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fade-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .reveal {
    opacity: 0;
    transform: translateY(32px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }

  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .reveal-delay-1 { transition-delay: 0.1s; }
  .reveal-delay-2 { transition-delay: 0.2s; }
  .reveal-delay-3 { transition-delay: 0.3s; }
  .reveal-delay-4 { transition-delay: 0.4s; }
  .reveal-delay-5 { transition-delay: 0.5s; }

  /* SECTION COMMONS */
  section {
    position: relative;
    padding: 120px 60px;
  }

  .section-label {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
  }

  .section-title {
    font-family: var(--font-display);
    font-size: clamp(32px, 4.5vw, 56px);
    font-weight: 600;
    letter-spacing: -1.5px;
    line-height: 1.1;
    margin-bottom: 20px;
  }

  .section-desc {
    font-size: 16px;
    color: var(--dim);
    max-width: 560px;
    line-height: 1.7;
  }

  .max-container { max-width: 1200px; margin: 0 auto; }

  /* DIVIDER */
  .section-divider {
    height: 1px;
    background: linear-gradient(to right, transparent, var(--border), transparent);
    margin: 0 60px;
  }

  /* ABOUT */
  #about { padding-top: 140px; }

  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
    margin-top: 70px;
  }

  .about-text p {
    font-size: 16px;
    color: var(--dim);
    line-height: 1.8;
    margin-bottom: 20px;
  }

  .about-text p strong {
    color: var(--white);
    font-weight: 500;
  }

  .about-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
  }

  .stat-card {
    background: var(--glass);
    border: 1px solid var(--border);
    padding: 28px;
    transition: background 0.3s, border-color 0.3s;
  }

  .stat-card:first-child { border-radius: 16px 0 0 0; }
  .stat-card:nth-child(2) { border-radius: 0 16px 0 0; }
  .stat-card:nth-child(3) { border-radius: 0 0 0 16px; }
  .stat-card:last-child { border-radius: 0 0 16px 0; }

  .stat-card:hover {
    background: var(--glass-hover);
    border-color: rgba(255,255,255,0.14);
  }

  .stat-number {
    font-family: var(--font-display);
    font-size: 40px;
    font-weight: 700;
    letter-spacing: -2px;
    color: var(--white);
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat-number span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stat-label {
    font-size: 12px;
    color: var(--dimmer);
    font-weight: 400;
    letter-spacing: 0.3px;
  }

  /* RESEARCH AREAS */
  #research { background: rgba(255,255,255,0.01); }

  .research-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 60px;
  }

  .research-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
  }

  .research-card {
    background: var(--glass);
    border: 1px solid var(--border);
    padding: 40px 36px;
    cursor: default;
    transition: background 0.35s, border-color 0.35s, transform 0.35s;
    position: relative;
    overflow: hidden;
  }

  .research-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 30%, var(--glow-blue), transparent 60%);
    opacity: 0;
    transition: opacity 0.4s;
  }

  .research-card:hover::before { opacity: 1; }
  .research-card:hover {
    background: var(--glass-hover);
    border-color: rgba(255,255,255,0.14);
    transform: translateY(-3px);
  }

  .research-card:first-child { border-radius: 16px 0 0 0; }
  .research-card:nth-child(3) { border-radius: 0 16px 0 0; }
  .research-card:nth-child(4) { border-radius: 0 0 0 16px; }
  .research-card:last-child { border-radius: 0 0 16px 0; }

  .card-icon {
    width: 44px; height: 44px;
    margin-bottom: 24px;
    position: relative;
    z-index: 1;
  }

  .card-icon svg {
    width: 100%;
    height: 100%;
    stroke: var(--accent);
    fill: none;
    stroke-width: 1.5;
  }

  .research-card h3 {
    font-family: var(--font-display);
    font-size: 19px;
    font-weight: 600;
    letter-spacing: -0.5px;
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }

  .research-card p {
    font-size: 14px;
    color: var(--dim);
    line-height: 1.7;
    position: relative;
    z-index: 1;
  }

  .card-tag {
    display: inline-block;
    margin-top: 18px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }

  /* PUBLICATIONS */
  #publications { }

  .pub-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 60px;
  }

  .pub-meta {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--dimmer);
  }

  .publications-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .pub-card {
    background: var(--glass);
    border: 1px solid var(--border);
    padding: 32px 36px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    align-items: center;
    transition: background 0.3s, border-color 0.3s;
    cursor: default;
  }

  .pub-card:first-child { border-radius: 12px 12px 0 0; }
  .pub-card:last-child { border-radius: 0 0 12px 12px; }

  .pub-card:hover {
    background: var(--glass-hover);
    border-color: rgba(255,255,255,0.12);
  }

  .pub-number {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--dimmer);
    margin-bottom: 8px;
  }

  .pub-title {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 500;
    letter-spacing: -0.3px;
    margin-bottom: 8px;
    color: var(--white);
  }

  .pub-desc {
    font-size: 13px;
    color: var(--dim);
    line-height: 1.6;
    max-width: 640px;
  }

  .pub-tags {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .pub-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--dimmer);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .status-badge {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(111, 163, 255, 0.08);
    border: 1px solid rgba(111, 163, 255, 0.2);
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 7px 16px;
    border-radius: 100px;
    white-space: nowrap;
  }

  .status-badge::before {
    content: '';
    display: block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  /* BLOG */
  #blog { }

  .blog-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 2px;
    margin-top: 60px;
  }

  .blog-card {
    background: var(--glass);
    border: 1px solid var(--border);
    padding: 40px;
    cursor: default;
    transition: background 0.3s, border-color 0.3s, transform 0.3s;
    position: relative;
    overflow: hidden;
  }

  .blog-card:first-child { border-radius: 12px 0 0 0; }
  .blog-card:nth-child(2) { border-radius: 0 12px 0 0; }
  .blog-card:nth-child(3) { border-radius: 0 0 0 12px; }
  .blog-card:last-child { border-radius: 0 0 12px 0; }

  .blog-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.4s;
  }

  .blog-card:hover::after { opacity: 0.5; }
  .blog-card:hover {
    background: var(--glass-hover);
    border-color: rgba(255,255,255,0.12);
  }

  .blog-category {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }

  .blog-card h3 {
    font-family: var(--font-display);
    font-size: 21px;
    font-weight: 600;
    letter-spacing: -0.5px;
    line-height: 1.3;
    margin-bottom: 14px;
  }

  .blog-card p {
    font-size: 14px;
    color: var(--dim);
    line-height: 1.7;
    margin-bottom: 24px;
  }

  .blog-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .blog-date {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--dimmer);
  }

  .blog-read {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .blog-read::after {
    content: '→';
    color: var(--accent);
    transition: transform 0.2s;
  }

  .blog-card:hover .blog-read::after { transform: translateX(4px); }

  /* MISSION */
  #mission {
    background: linear-gradient(160deg, rgba(111,163,255,0.04) 0%, transparent 50%, rgba(168,126,255,0.04) 100%);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    text-align: center;
    padding: 160px 60px;
  }

  .mission-eyebrow {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 40px;
  }

  .mission-statement {
    font-family: var(--font-display);
    font-size: clamp(24px, 4vw, 48px);
    font-weight: 500;
    letter-spacing: -1.5px;
    line-height: 1.25;
    max-width: 900px;
    margin: 0 auto 50px;
    color: var(--white);
  }

  .mission-statement em {
    font-style: normal;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .mission-pillars {
    display: flex;
    justify-content: center;
    gap: 48px;
    flex-wrap: wrap;
    margin-top: 60px;
  }

  .pillar {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .pillar-icon {
    width: 40px; height: 40px;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .pillar span {
    font-size: 12px;
    color: var(--dim);
    letter-spacing: 0.3px;
  }

  /* JOIN */
  #join {
    background: radial-gradient(ellipse at center, rgba(111,163,255,0.06) 0%, transparent 70%);
  }

  .join-container {
    max-width: 1200px;
    margin: 0 auto;
  }

  .join-header {
    text-align: center;
    margin-bottom: 70px;
  }

  .join-header .section-desc {
    margin: 0 auto;
    text-align: center;
  }

  .join-roles {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2px;
    margin-bottom: 60px;
  }

  .role-card {
    background: var(--glass);
    border: 1px solid var(--border);
    padding: 36px 28px;
    text-align: center;
    transition: background 0.3s, border-color 0.3s, transform 0.3s;
    cursor: default;
  }

  .role-card:first-child { border-radius: 12px 0 0 12px; }
  .role-card:last-child { border-radius: 0 12px 12px 0; }

  .role-card:hover {
    background: var(--glass-hover);
    border-color: rgba(255,255,255,0.14);
    transform: translateY(-4px);
  }

  .role-emoji {
    font-size: 28px;
    margin-bottom: 16px;
    display: block;
  }

  .role-card h4 {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 10px;
    letter-spacing: -0.3px;
  }

  .role-card p {
    font-size: 13px;
    color: var(--dim);
    line-height: 1.6;
  }

  .join-cta {
